apiVersion: apps/v1
kind: Deployment
metadata:
   name: mysql-deployment
   namespace: docker-network-ns
spec:
     
   replicas: 1
   
   selector:
       matchLabels:
               app: mysql-tag
   template:
        metadata:
            labels:
               app: mysql-tag

        spec:    
            
           containers:
             - name: mysql-cont
               image: mysql:8.0
               ports:
                - containerPort: 3306
               envFrom:
                   - configMapRef:
                             name: mysql-config

               env:
                - name: MYSQL_ROOT_PASSWORD
                  valueFrom:
                      secretKeyRef:
                          name: mysql-secret
                          key: MYSQL_ROOT_PASSWORD 						  